<svg viewBox="0 0 920 600" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Precheck terminal report example</title>
  <desc>A terminal window showing precheck running against a Phoenix project: security scan, a list of checks with pass/warn results, a test summary, and a PR-readiness verdict, plus a live score badge.</desc>

  <rect x="0" y="0" width="920" height="600" rx="10" fill="#0d1117"/>

  <rect x="0" y="0" width="920" height="40" rx="10" fill="#161b22"/>
  <rect x="0" y="30" width="920" height="10" fill="#161b22"/>
  <circle cx="24" cy="20" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="20" r="6" fill="#ffbd2e"/>
  <circle cx="64" cy="20" r="6" fill="#27c93f"/>
  <text x="460" y="25" text-anchor="middle" font-family="SFMono-Regular, Consolas, Menlo, monospace" font-size="13" fill="#8b949e">precheck — reportauto-api</text>

  <g font-family="SFMono-Regular, Consolas, Menlo, monospace" font-size="14.5">
    <text x="28" y="70" fill="#58a6ff">&gt;_ Elixir Pre-deployment Check</text>
    <text x="28" y="92" fill="#c9d1d9">Project: reportauto-api</text>
    <text x="28" y="114" fill="#c9d1d9">Date: Thu Jul 2 09:14:02 2026</text>

    <text x="28" y="146" fill="#56d4dd">╔════════════════════════════════════════╗</text>
    <text x="28" y="166" fill="#56d4dd">║     SECURITY SCAN                       ║</text>
    <text x="28" y="186" fill="#56d4dd">╚════════════════════════════════════════╝</text>
    <text x="28" y="208" fill="#3fb950">✓ No hardcoded credentials found</text>
    <text x="28" y="228" fill="#3fb950">✓ No database URLs with credentials</text>

    <text x="28" y="260" fill="#56d4dd">╔════════════════════════════════════════╗</text>
    <text x="28" y="280" fill="#56d4dd">║     RUNNING CHECKS                      ║</text>
    <text x="28" y="300" fill="#56d4dd">╚════════════════════════════════════════╝</text>
    <text x="28" y="326" fill="#3fb950">✓ Elixir code formatting passed</text>
    <text x="28" y="348" fill="#3fb950">✓ Compilation passed</text>
    <text x="28" y="370" fill="#3fb950">✓ Test suite passed</text>
    <text x="28" y="392" fill="#e3b341">! Module documentation failed [MEDIUM]</text>
    <text x="28" y="414" fill="#3fb950">✓ Deprecated functions passed</text>

    <rect x="28" y="434" width="500" height="130" rx="6" fill="none" stroke="#30363d"/>
    <text x="44" y="458" fill="#58a6ff">Total Tests:</text><text x="150" y="458" fill="#c9d1d9">18</text>
    <text x="44" y="480" fill="#3fb950">Passed:</text><text x="150" y="480" fill="#c9d1d9">17</text>
    <text x="44" y="502" fill="#ff7b72">Failed:</text><text x="150" y="502" fill="#c9d1d9">1</text>
    <text x="44" y="524" fill="#58a6ff">Pass Rate:</text><text x="150" y="524" fill="#c9d1d9">92%</text>
    <text x="44" y="550" fill="#3fb950">✓ READY FOR PR - Only minor issues remaining</text>

    <text x="28" y="586" fill="#8b949e">Report saved to elixir_report.txt</text>
  </g>

  <g transform="translate(680,434)">
    <rect x="0" y="0" width="212" height="26" fill="#555"/>
    <rect x="0" y="0" width="90" height="26" fill="#555"/>
    <rect x="90" y="0" width="122" height="26" fill="#3fb950"/>
    <text x="45" y="18" text-anchor="middle" font-family="SFMono-Regular, Consolas, Menlo, monospace" font-size="13" fill="#eaeaea">precheck</text>
    <text x="151" y="18" text-anchor="middle" font-family="SFMono-Regular, Consolas, Menlo, monospace" font-size="13" fill="#04342c">92%</text>
  </g>
</svg>