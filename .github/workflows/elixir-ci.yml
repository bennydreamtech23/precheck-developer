name: Elixir CI

on:
  workflow_call:
    inputs:
      elixir_version:
        description: Elixir version to install with erlef/setup-beam
        required: true
        type: string
      otp_version:
        description: OTP version to install with erlef/setup-beam
        required: true
        type: string
      postgres_version:
        description: PostgreSQL service image tag for the test job
        required: false
        default: "16"
        type: string

jobs:
  format:
    name: format
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
    steps:
      - name: Check out application repository
        uses: actions/checkout@v4

      - name: Set up BEAM
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ inputs.elixir_version }}
          otp-version: ${{ inputs.otp_version }}

      - name: Cache deps and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-test-${{ inputs.elixir_version }}-${{ inputs.otp_version }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-test-${{ inputs.elixir_version }}-${{ inputs.otp_version }}-

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Install dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

  compile:
    name: compile
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
    steps:
      - name: Check out application repository
        uses: actions/checkout@v4

      - name: Set up BEAM
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ inputs.elixir_version }}
          otp-version: ${{ inputs.otp_version }}

      - name: Cache deps and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-test-${{ inputs.elixir_version }}-${{ inputs.otp_version }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-test-${{ inputs.elixir_version }}-${{ inputs.otp_version }}-

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Install dependencies
        run: mix deps.get

      - name: Compile with warnings as errors
        run: mix compile --warnings-as-errors

  test:
    name: test
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
      DATABASE_URL: ecto://postgres:postgres@127.0.0.1:5432/app_test
      POSTGRES_DB: app_test
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PASSWORD: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: postgres
    services:
      postgres:
        image: postgres:${{ inputs.postgres_version }}
        env:
          POSTGRES_DB: app_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d app_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out application repository
        uses: actions/checkout@v4

      - name: Set up BEAM
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ inputs.elixir_version }}
          otp-version: ${{ inputs.otp_version }}

      - name: Cache deps and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-test-${{ inputs.elixir_version }}-${{ inputs.otp_version }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-test-${{ inputs.elixir_version }}-${{ inputs.otp_version }}-

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Install dependencies
        run: mix deps.get

      - name: Run test suite
        run: mix test

  ci_required:
    name: ci-required
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - format
      - compile
      - test
    steps:
      - name: Verify required CI jobs
        run: |
          if [[ "${{ needs.format.result }}" != "success" ]]; then
            echo "format finished with ${{ needs.format.result }}"
            exit 1
          fi
          if [[ "${{ needs.compile.result }}" != "success" ]]; then
            echo "compile finished with ${{ needs.compile.result }}"
            exit 1
          fi
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "test finished with ${{ needs.test.result }}"
            exit 1
          fi
