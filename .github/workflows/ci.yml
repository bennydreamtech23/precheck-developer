name: CI

on:
  workflow_dispatch: {}
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test-elixir:
    name: Elixir Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.15"
          otp-version: "26"

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}

      - name: Install dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Run tests
        run: mix test

  test-scripts:
    name: Script Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # elixir_precheck.sh needs elixir/mix on PATH (it checks for them
      # first thing and exits if missing) - without this step the script,
      # and therefore the badge report, never actually runs.
      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.15"
          otp-version: "26"

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}

      - name: Install dependencies
        run: mix deps.get

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts

      - name: Test help output
        run: ./scripts/universal_precheck.sh --help

      # elixir_precheck.sh reports its own score to the hosted Cloudflare
      # Worker badge service internally (report_precheck_score, gated on
      # GITHUB_ACTIONS/GITHUB_REPOSITORY) - no separate badge-publishing
      # step needed here anymore. continue-on-error so a failing check
      # still reports (and shows) a real, possibly red/yellow score.
      - name: Run precheck (self-check, also reports the score badge)
        continue-on-error: true
        run: ./scripts/elixir_precheck.sh
