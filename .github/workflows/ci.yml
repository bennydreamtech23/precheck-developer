name: CI

on:
  workflow_dispatch: {}
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test-elixir:
    name: Elixir Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.15"
          otp-version: "26"

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}

      - name: Install dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Run tests
        run: mix test

  test-scripts:
    name: Script Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts

      - name: Test help output
        run: ./scripts/universal_precheck.sh --help

      # Run precheck against this repo itself so the score badge always
      # reflects the current state of master. continue-on-error means a
      # failed check doesn't block CI here - it's just reported on the badge.
      - name: Run precheck (self-check for badge)
        id: precheck
        continue-on-error: true
        run: ./scripts/elixir_precheck.sh

      - name: Read badge data
        id: badge
        if: always()
        run: |
          echo "message=$(jq -r .message precheck-badge.json)" >> "$GITHUB_OUTPUT"
          echo "color=$(jq -r .color precheck-badge.json)" >> "$GITHUB_OUTPUT"

      - name: Publish precheck score badge
        if: always()
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: 3fbedf0934739dfa414e61074027881d
          filename: precheck-badge.json
          label: precheck
          message: ${{ steps.badge.outputs.message }}
          color: ${{ steps.badge.outputs.color }}
