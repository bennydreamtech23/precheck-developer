name: Precheck

on:
  workflow_call:
    inputs:
      project_type:
        description: "Required. Must be 'elixir' or 'nodejs'."
        required: true
        type: string
      elixir_version:
        description: "Required if project_type is 'elixir'."
        required: false
        default: ""
        type: string
      otp_version:
        description: "Required if project_type is 'elixir'."
        required: false
        default: ""
        type: string
      node_version:
        description: "Required if project_type is 'nodejs'."
        required: false
        default: ""
        type: string
      package_manager:
        required: false
        default: ""
        type: string

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate inputs
        run: |
          case "${{ inputs.project_type }}" in
            elixir)
              if [ -z "${{ inputs.elixir_version }}" ] || [ -z "${{ inputs.otp_version }}" ]; then
                echo "::error::project_type is 'elixir' — elixir_version and otp_version are required."
                exit 1
              fi
              ;;
            nodejs)
              if [ -z "${{ inputs.node_version }}" ]; then
                echo "::error::project_type is 'nodejs' — node_version is required."
                exit 1
              fi
              ;;
            *)
              echo "::error::project_type must be 'elixir' or 'nodejs', got '${{ inputs.project_type }}'"
              exit 1
              ;;
          esac

  precheck-elixir:
    needs: validate
    if: inputs.project_type == 'elixir'
    uses: bennydreamtech23/precheck-developer/.github/workflows/precheck-elixir.yml@master
    with:
      elixir_version: ${{ inputs.elixir_version }}
      otp_version: ${{ inputs.otp_version }}

  precheck-nodejs:
    needs: validate
    if: inputs.project_type == 'nodejs'
    uses: bennydreamtech23/precheck-developer/.github/workflows/precheck-nodejs.yml@master
    with:
      node_version: ${{ inputs.node_version }}
      package_manager: ${{ inputs.package_manager }}
